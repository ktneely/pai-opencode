# OpenAI GPT - Premium alternative provider
#
# Each agent uses one model. Heavy agents get gpt-5.1, light agents get
# gpt-4.1-mini, everyone else gets gpt-4.1.
#
# Requires: OPENAI_API_KEY in ~/.opencode/.env
#
# Available models (Feb 2026):
#   openai/gpt-5.1          - Most capable, reasoning + coding
#   openai/gpt-4.1          - Balanced standard
#   openai/gpt-4.1-mini     - Fast budget
#   openai/gpt-4o           - Previous generation (still available)
#   openai/gpt-5-mini       - Newer budget alternative
#   openai/o3-mini          - Reasoning specialist (budget)
#
name: openai
description: OpenAI GPT models - premium alternative provider

# Default model for the main opencode.json "model" field
default_model: openai/gpt-4.1

# Agent routing — one model per agent
agents:
  Algorithm:
    model: openai/gpt-5.1
  Architect:
    model: openai/gpt-4.1
  Engineer:
    model: openai/gpt-4.1
  general:
    model: openai/gpt-4.1
  explore:
    model: openai/gpt-4.1-mini
  Intern:
    model: openai/gpt-4.1-mini
  Writer:
    model: openai/gpt-4.1
  DeepResearcher:
    model: openai/gpt-4.1
  GeminiResearcher:
    model: openai/gpt-4.1
  GrokResearcher:
    model: openai/gpt-4.1
  PerplexityResearcher:
    model: openai/gpt-4.1
  CodexResearcher:
    model: openai/gpt-4.1
  QATester:
    model: openai/gpt-4.1
  Pentester:
    model: openai/gpt-4.1
  Designer:
    model: openai/gpt-4.1
  Artist:
    model: openai/gpt-4.1
