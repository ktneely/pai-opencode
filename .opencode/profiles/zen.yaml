# OpenCode ZEN FREE - Free tier (no API key required)
# Community models with data usage tradeoff
#
# Free models (as of April 2026):
#   opencode/big-pickle            - Zen flagship (free, heaviest)
#   opencode/qwen3.6-plus-free     - Capable general/coding free model
#   opencode/nemotron-3-super-free - Alternative mid-range free model
#   opencode/minimax-m2.5-free     - Lightweight free model
#   opencode/gpt-5-nano            - Free, fastest/cheapest
#
# NOTE: Free model availability on Zen changes periodically. Run
#       `opencode models` to see the current free tier, or check
#       https://opencode.ai/docs/zen/ for the authoritative list.
#
# Credit: model roster re-verified against the April 2026 Zen pricing
# page; upgraded from the Jan 2026 set (kimi-k2.5-free, glm-4.7-free,
# minimax-m2.1-free) which is no longer offered on the free tier.
# Thanks to @ktneely (PR #103) for flagging that the old free models
# had been retired.
#
name: zen-free
description: OpenCode ZEN free models - no API key needed, great for getting started

default_model: opencode/qwen3.6-plus-free

agents:
  Algorithm:
    model: opencode/big-pickle
  Architect:
    model: opencode/qwen3.6-plus-free
  Engineer:
    model: opencode/qwen3.6-plus-free
  general:
    model: opencode/qwen3.6-plus-free
  explore:
    model: opencode/gpt-5-nano
  Intern:
    model: opencode/gpt-5-nano
  Writer:
    model: opencode/qwen3.6-plus-free
  DeepResearcher:
    model: opencode/nemotron-3-super-free
  GeminiResearcher:
    model: opencode/minimax-m2.5-free
  GrokResearcher:
    model: opencode/qwen3.6-plus-free
  PerplexityResearcher:
    model: opencode/big-pickle
  CodexResearcher:
    model: opencode/nemotron-3-super-free
  QATester:
    model: opencode/qwen3.6-plus-free
  Pentester:
    model: opencode/qwen3.6-plus-free
  Designer:
    model: opencode/minimax-m2.5-free
  Artist:
    model: opencode/minimax-m2.5-free
