# OpenCode ZEN PAID - Budget-friendly pay-as-you-go
# No subscription needed. PAID models preserve privacy (no data collection).
#
# Connect via: /connect in OpenCode → choose ZEN
#
# Paid models (as of April 2026):
#   opencode/kimi-k2.5         - $0.60 / $3.00   — general coding workhorse
#   opencode/glm-5.1           - $1.40 / $4.40   — newest GLM, premium reasoning
#   opencode/glm-5             - $1.00 / $3.20   — prior-gen GLM, cheaper
#   opencode/minimax-m2.5      - $0.30 / $1.20   — cheapest paid, fast
#   opencode/qwen3-coder-480b  - $0.45 / $1.50   — large coder model
#   opencode/gemini-3-flash    - $0.50 / $3.00   — writer/researcher sweet spot
#   opencode/gemini-3.1-pro    - $2.00 / $12.00  — premium Google
#
# Credit: model roster re-verified against the April 2026 Zen pricing
# page. Thanks to @ktneely (PR #103) for flagging that `glm-4.7` and
# `minimax-m2.1` had been superseded by `glm-5`/`glm-5.1` and `minimax-m2.5`.
#
