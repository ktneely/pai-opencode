# Anthropic Claude - Recommended for best PAI experience
#
# Each agent uses one model. Model selection per agent is chosen to match
# the agent's typical workload (explore/Intern = fast, Algorithm = deep).
#
# Requires: Anthropic Max subscription or ANTHROPIC_API_KEY
#
name: anthropic
description: Anthropic Claude models - recommended for best quality

# Default model for the main opencode.json "model" field
default_model: anthropic/claude-sonnet-4-5

# Agent routing — one model per agent
agents:
  Algorithm:
    model: anthropic/claude-opus-4-6
  Architect:
    model: anthropic/claude-sonnet-4-5
  Engineer:
    model: anthropic/claude-sonnet-4-5
  general:
    model: anthropic/claude-sonnet-4-5
  explore:
    model: anthropic/claude-haiku-4-5
  Intern:
    model: anthropic/claude-haiku-4-5
  Writer:
    model: anthropic/claude-sonnet-4-5
  DeepResearcher:
    model: anthropic/claude-sonnet-4-5
  GeminiResearcher:
    model: anthropic/claude-sonnet-4-5
  GrokResearcher:
    model: anthropic/claude-sonnet-4-5
  PerplexityResearcher:
    model: anthropic/claude-sonnet-4-5
  CodexResearcher:
    model: anthropic/claude-sonnet-4-5
  QATester:
    model: anthropic/claude-sonnet-4-5
  Pentester:
    model: anthropic/claude-sonnet-4-5
  Designer:
    model: anthropic/claude-sonnet-4-5
  Artist:
    model: anthropic/claude-sonnet-4-5
